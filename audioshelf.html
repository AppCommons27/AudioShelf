<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AudioShelf — 聽書</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0e0c0a; --surface:#181410; --card:#201c17;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --gold:#c9943a; --gold-l:#e8b96a; --gold-dim:rgba(201,148,58,0.15);
  --text:#e8e0d4; --text-dim:#8a7e6e; --text-mid:#b8a990;
  --green:#4a8a5a; --radius:12px; --shadow:0 8px 32px rgba(0,0,0,0.5);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100svh;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:var(--surface);} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

/* LOGIN */
.login-screen{min-height:100svh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem;padding:2rem;background:radial-gradient(ellipse 60% 40% at 50% 30%,rgba(201,148,58,0.08) 0%,transparent 70%);}
.login-logo{font-family:'Playfair Display',serif;font-size:2.8rem;color:var(--gold);display:flex;align-items:center;gap:16px;}
.login-logo-icon{width:58px;height:58px;background:var(--gold-dim);border:1px solid var(--gold);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;}
.login-tagline{font-family:'Noto Serif TC',serif;color:var(--text-dim);font-size:0.95rem;text-align:center;line-height:1.8;}
.btn-google{display:flex;align-items:center;gap:12px;background:#fff;color:#1f1f1f;border:none;border-radius:8px;padding:13px 28px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.4);}
.btn-google svg{width:20px;height:20px;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;border-bottom:1px solid var(--border);background:rgba(14,12,10,0.92);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;}
.logo{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);display:flex;align-items:center;gap:10px;}
.logo-icon{width:28px;height:28px;background:var(--gold-dim);border:1px solid var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;}
.user-info{display:flex;align-items:center;gap:10px;}
.user-avatar{width:32px;height:32px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;}
.user-name{font-size:0.82rem;color:var(--text-mid);}
.btn-signout{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:8px;padding:5px 12px;font-size:0.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.btn-signout:hover{border-color:var(--border2);color:var(--text);}

/* TABS */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 2rem;position:sticky;top:60px;z-index:90;}
.tab-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;color:var(--text-dim);padding:14px 20px;border-bottom:2px solid transparent;transition:all 0.15s;display:flex;align-items:center;gap:7px;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:2rem;}
.tab-view{display:none;animation:fadeIn 0.2s ease;}
.tab-view.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SHELF */
.shelf-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;}
.shelf-title{font-family:'Playfair Display',serif;font-size:1.8rem;}
.shelf-title span{color:var(--gold);font-style:italic;}
.cat-bar{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.cat-chip{padding:5px 14px;border-radius:999px;font-size:0.78rem;cursor:pointer;border:1px solid var(--border);color:var(--text-dim);background:transparent;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.cat-chip:hover{border-color:var(--border2);color:var(--text);}
.cat-chip.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:1.2rem;}
.book-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all 0.2s ease;position:relative;}
.book-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:var(--shadow);}
.book-cover{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;overflow:hidden;}
.book-progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.1);}
.book-progress-fill{height:100%;background:var(--gold);transition:width 0.3s;}
.book-info{padding:0.7rem;}
.book-title{font-family:'Noto Serif TC',serif;font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.book-meta{font-size:0.7rem;color:var(--text-dim);}
.book-cat-badge{position:absolute;top:7px;left:7px;background:rgba(14,12,10,0.75);border:1px solid var(--border2);border-radius:999px;padding:2px 8px;font-size:0.62rem;color:var(--text-mid);backdrop-filter:blur(4px);}
.book-card-actions{position:absolute;top:6px;right:6px;display:flex;gap:3px;opacity:0;transition:opacity 0.15s;}
.book-card:hover .book-card-actions{opacity:1;}
.book-action-btn{width:26px;height:26px;border-radius:5px;background:rgba(14,12,10,0.8);border:1px solid var(--border2);backdrop-filter:blur(4px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.72rem;color:var(--text-dim);transition:all 0.15s;}
.book-action-btn:hover{color:var(--text);}
.book-action-btn.del:hover{color:#e08080;}
.empty-shelf{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--text-dim);}
.empty-shelf .empty-icon{font-size:3rem;margin-bottom:1rem;opacity:0.4;}

/* ADD TAB */
.add-tab-layout{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start;}
@media(max-width:700px){.add-tab-layout{grid-template-columns:1fr;}}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;}
.form-card h2{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:1.25rem;color:var(--text);}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:0.72rem;font-weight:500;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
input[type="text"],select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.15s;resize:vertical;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);}
input::placeholder,textarea::placeholder{color:var(--text-dim);}
select option{background:var(--surface);}
.emoji-picker{display:flex;flex-wrap:wrap;gap:6px;padding:0.75rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;max-height:110px;overflow-y:auto;}
.emoji-btn{width:34px;height:34px;border-radius:6px;background:transparent;border:1px solid transparent;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all 0.12s;}
.emoji-btn:hover{background:var(--card);border-color:var(--border);}
.emoji-btn.selected{background:var(--gold-dim);border-color:var(--gold);}
.char-count{font-size:0.7rem;color:var(--text-dim);text-align:right;margin-top:4px;}
.my-books-list{display:flex;flex-direction:column;gap:8px;}
.my-book-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all 0.15s;}
.my-book-item:hover{border-color:var(--border2);}
.my-book-emoji{font-size:1.5rem;flex-shrink:0;}
.my-book-info{flex:1;min-width:0;}
.my-book-title{font-size:0.85rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.my-book-meta{font-size:0.72rem;color:var(--text-dim);}
.my-book-actions{display:flex;gap:4px;flex-shrink:0;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;transition:all 0.18s ease;}
.btn-gold{background:var(--gold);color:#0e0c0a;}
.btn-gold:hover{background:var(--gold-l);transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,148,58,0.3);}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);}

/* READER */
.reader-back{display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:0.85rem;font-family:'DM Sans',sans-serif;padding:0;margin-bottom:1.5rem;transition:color 0.15s;}
.reader-back:hover{color:var(--gold);}
.reader-layout{display:grid;grid-template-columns:190px 1fr;gap:2rem;align-items:start;}
@media(max-width:640px){.reader-layout{grid-template-columns:1fr;}}
.reader-cover-big{width:100%;aspect-ratio:2/3;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:4.5rem;border:1px solid var(--border);}
.reader-category{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem;}
.reader-title{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3vw,2rem);line-height:1.2;margin-bottom:1.25rem;}
.progress-ring-wrap{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;}
.progress-ring{position:relative;width:56px;height:56px;flex-shrink:0;}
.progress-ring svg{transform:rotate(-90deg);}
.progress-ring circle{transition:stroke-dashoffset 0.4s ease;}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:600;color:var(--gold);}
.progress-text{font-size:0.78rem;color:var(--text-dim);line-height:1.6;}
.progress-text strong{color:var(--text);display:block;}
.player-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;}
.seek-bar-wrap{margin-bottom:1rem;}
.seek-labels{display:flex;justify-content:space-between;font-size:0.7rem;color:var(--text-dim);margin-bottom:5px;}
.seek-bar{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:99px;background:var(--border2);outline:none;cursor:pointer;}
.seek-bar::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--gold);cursor:pointer;}
.player-controls{display:flex;align-items:center;justify-content:center;gap:0.75rem;margin-bottom:1rem;}
.ctrl-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);transition:all 0.15s;display:flex;align-items:center;justify-content:center;font-size:1rem;width:38px;height:38px;border-radius:50%;}
.ctrl-btn:hover{color:var(--text);background:var(--border);}
.ctrl-play{width:50px;height:50px;background:var(--gold);color:#0e0c0a;border-radius:50%;font-size:1.2rem;flex-shrink:0;}
.ctrl-play:hover{background:var(--gold-l);transform:scale(1.05);}
.player-settings{display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;}
.setting-group{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:0.75rem;color:var(--text-dim);}
.setting-group select{background:none;border:none;color:var(--text);font-size:0.75rem;padding:0;width:auto;outline:none;}
.sleep-active{border-color:rgba(201,148,58,0.4);color:var(--gold);}
.text-display-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;max-height:280px;overflow-y:auto;margin-bottom:1.25rem;}
.text-display{font-family:'Noto Serif TC',serif;font-size:0.92rem;line-height:2;color:var(--text-mid);white-space:pre-wrap;word-break:break-word;}
.text-display .highlight{background:var(--gold-dim);color:var(--gold-l);border-radius:3px;padding:0 2px;}
.chapter-section h3{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.6rem;}
.chapter-list{display:flex;flex-direction:column;gap:3px;}
.chapter-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;cursor:pointer;transition:background 0.15s;font-size:0.82rem;color:var(--text-dim);border:1px solid transparent;}
.chapter-item:hover{background:var(--card);}
.chapter-item.active{background:var(--gold-dim);color:var(--gold);border-color:rgba(201,148,58,0.2);}
.chapter-num{font-size:0.68rem;color:var(--text-dim);width:18px;flex-shrink:0;}
.chapter-done{color:var(--green);font-size:0.68rem;margin-left:auto;}
.notes-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-top:1rem;}
.notes-card h3{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.6rem;}
.notes-card textarea{min-height:90px;font-size:0.85rem;}

/* SLEEP */
.sleep-indicator{position:fixed;top:70px;right:1rem;background:var(--surface);border:1px solid rgba(201,148,58,0.3);border-radius:999px;padding:6px 14px;font-size:0.73rem;color:var(--gold);display:none;align-items:center;gap:6px;z-index:90;box-shadow:var(--shadow);}
.sleep-indicator.active{display:flex;}
.sleep-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.5s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(1.3)}}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border2);border-radius:999px;padding:10px 20px;font-size:0.82rem;color:var(--text);box-shadow:var(--shadow);z-index:500;pointer-events:none;opacity:0;transition:opacity 0.2s ease;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.gold{border-color:rgba(201,148,58,0.4);color:var(--gold);}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:1rem;}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:0.85rem;color:var(--text-dim);}

body::after{content:'';position:fixed;top:0;left:0;right:0;height:300px;background:radial-gradient(ellipse 60% 40% at 80% 0%,rgba(201,148,58,0.05) 0%,transparent 70%);pointer-events:none;z-index:0;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">載入中…</div>
</div>

<div class="sleep-indicator" id="sleepIndicator">
  <div class="sleep-dot"></div>
  <span id="sleepCountdown">睡眠定時：--:--</span>
</div>

<!-- LOGIN -->
<div id="loginScreen" style="display:none">
  <div class="login-screen">
    <div class="login-logo">
      <div class="login-logo-icon">📖</div>
      AudioShelf
    </div>
    <div class="login-tagline">你的私人雲端聽書空間<br>用 Google 帳號登入，書架永遠跟著你</div>
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      使用 Google 帳號登入
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">
  <header>
    <div class="logo"><div class="logo-icon">📖</div>AudioShelf</div>
    <div class="user-info">
      <img class="user-avatar" id="userAvatar" src="" alt="" />
      <span class="user-name" id="userName"></span>
      <button class="btn-signout" onclick="signOut()">登出</button>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" id="tabShelfBtn" onclick="switchTab('shelf')">📚 我的書架</button>
    <button class="tab-btn" id="tabAddBtn" onclick="switchTab('add')">✏️ 管理書本</button>
  </div>

  <main>
    <!-- SHELF TAB -->
    <div class="tab-view active" id="tabShelf">
      <div class="shelf-header">
        <h1 class="shelf-title">我的<span>書架</span></h1>
        <div style="font-size:0.8rem;color:var(--text-dim)" id="bookCount">0 本書</div>
      </div>
      <div class="cat-bar" id="catBar"></div>
      <div class="book-grid" id="bookGrid"></div>
    </div>

    <!-- MANAGE TAB -->
    <div class="tab-view" id="tabAdd">
      <div class="add-tab-layout">
        <div>
          <div class="form-card">
            <h2 id="formTitle">📝 新增書本</h2>
            <input type="hidden" id="editingBookId" value="" />
            <div class="form-group">
              <label>書名</label>
              <input type="text" id="inputTitle" placeholder="請輸入書名" />
            </div>
            <div class="form-group">
              <label>分類</label>
              <input type="text" id="inputCategory" placeholder="例：商業、心理、小說…" />
            </div>
            <div class="form-group">
              <label>封面圖示</label>
              <div class="emoji-picker" id="emojiPicker"></div>
            </div>
            <div class="form-group">
              <label>書本內文</label>
              <textarea id="inputText" rows="10" placeholder="貼上書本全文。&#10;&#10;分章節方式：&#10;第一章 標題&#10;Chapter 1 標題&#10;===&#10;&#10;或直接貼入，系統自動分段。"></textarea>
              <div class="char-count" id="charCount">0 字</div>
            </div>
            <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
              <button class="btn btn-gold" onclick="saveBook()" style="flex:1">💾 儲存書本</button>
              <button class="btn btn-ghost" onclick="clearForm()" id="cancelEditBtn" style="display:none">取消編輯</button>
            </div>
          </div>
        </div>
        <div>
          <div class="form-card">
            <h2>📚 已新增的書本</h2>
            <div class="my-books-list" id="myBooksList">
              <div style="text-align:center;padding:2rem;color:var(--text-dim);font-size:0.85rem">還沒有書本，快去新增吧！</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- READER -->
    <div class="tab-view" id="tabReader">
      <button class="reader-back" onclick="closeReader()">← 返回書架</button>
      <div class="reader-layout">
        <div>
          <div class="reader-cover-big" id="readerCoverBig"></div>
          <div class="notes-card">
            <h3>📝 筆記</h3>
            <textarea id="noteArea" placeholder="記錄想法、心得…" oninput="saveNote()"></textarea>
          </div>
        </div>
        <div>
          <div class="reader-category" id="readerCategory"></div>
          <div class="reader-title" id="readerTitle"></div>
          <div class="progress-ring-wrap">
            <div class="progress-ring">
              <svg width="56" height="56" viewBox="0 0 56 56">
                <circle cx="28" cy="28" r="22" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="4"/>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMuwWmue5oIV195GYBbfWdf6xD2OzOB2g",
  authDomain: "audioshelf-694aa.firebaseapp.com",
  projectId: "audioshelf-694aa",
  storageBucket: "audioshelf-694aa.firebasestorage.app",
  messagingSenderId: "722962062864",
  appId: "1:722962062864:web:acee4af30e0810ad377495"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null, books=[], currentBookId=null, currentChapterIdx=0;
let utterance=null, isPlaying=false, voices=[], selectedVoice=null;
let sleepTimer=null, sleepEndTime=null, sleepInterval=null;
let seekSim=null, chapterDuration=0, chapterElapsed=0;
let activeCategory='全部', activeTab='shelf';

const EMOJIS=['📚','📖','📝','🌟','🌙','🌿','🏔️','🌊','🦋','🦁','🐉','🌸','🔥','❄️','⚡','🎭','🎵','🏛️','🚀','🌍','💡','🔮','🗺️','⚔️','🧠','💫','🌺','🎯','🎪','🧩'];

// AUTH
window.signInWithGoogle = async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { showToast('登入失敗，請重試', false); }
};
window.signOut = async () => { stopTTS(); await fbSignOut(auth); };

onAuthStateChanged(auth, async (user) => {
  document.getElementById('loadingOverlay').style.display='none';
  if (user) {
    currentUser=user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    document.getElementById('userAvatar').src=user.photoURL||'';
    document.getElementById('userName').textContent=user.displayName||user.email;
    await loadBooks();
    renderShelf(); renderMyBooksList(); renderEmojiPicker();
  } else {
    currentUser=null; books=[];
    document.getElementById('loginScreen').style.display='block';
    document.getElementById('mainApp').style.display='none';
  }
});

// FIRESTORE
async function loadBooks() {
  if (!currentUser) return;
  try {
    const snap = await getDocs(query(collection(db,'books'), where('uid','==',currentUser.uid)));
    books = snap.docs.map(d=>({id:d.id,...d.data()}));
    books.sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
  } catch(e) { showToast('載入書架失敗',false); }
}

async function saveBookToFirestore(book) {
  if (!currentUser) return;
  try { await setDoc(doc(db,'books',book.id), {...book, uid:currentUser.uid}); }
  catch(e) { showToast('儲存失敗',false); }
}

async function deleteBookFromFirestore(id) {
  if (!currentUser) return;
  try { await deleteDoc(doc(db,'books',id)); }
  catch(e) { showToast('刪除失敗',false); }
}

// TABS
window.switchTab = (tab) => {
  activeTab=tab;
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(tab==='shelf'?'tabShelf':'tabAdd').classList.add('active');
  document.getElementById(tab==='shelf'?'tabShelfBtn':'tabAddBtn').classList.add('active');
  if (tab==='add') renderMyBooksList();
};

// EMOJI
function renderEmojiPicker() {
  const p=document.getElementById('emojiPicker'); p.innerHTML='';
  EMOJIS.forEach(e=>{
    const b=document.createElement('button'); b.className='emoji-btn'; b.type='button'; b.textContent=e;
    b.onclick=()=>{document.querySelectorAll('.emoji-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');};
    p.appendChild(b);
  });
  p.querySelector('.emoji-btn')?.classList.add('selected');
}
function getSelectedEmoji(){return document.querySelector('.emoji-btn.selected')?.textContent||'📚';}

document.getElementById('inputText').addEventListener('input',function(){
  document.getElementById('charCount').textContent=this.value.length.toLocaleString()+' 字';
});

// CHAPTERS
function parseChapters(text) {
  const re=/^(第[零一二三四五六七八九十百千\d]+[章节回部篇]\s*.+|Chapter\s*\d+\s*.+|Part\s*\d+\s*.+|={3,})/im;
  const lines=text.split('\n'); let chapters=[],title='第一章',lines2=[],hasEx=false;
  lines.forEach(l=>{
    const t=l.trim();
    if(re.test(t)&&t.length<80){if(lines2.join('').trim().length>0)chapters.push({title,content:lines2.join('\n').trim()});title=t==='==='?`第${chapters.length+1}部分`:t;lines2=[];hasEx=true;}
    else lines2.push(l);
  });
  if(lines2.join('').trim().length>0)chapters.push({title,content:lines2.join('\n').trim()});
  if(!hasEx||chapters.length===1){const f=text.trim();if(f.length>2000){chapters=[];let i=0,n=1;while(i<f.length){let e=i+1500;const nb=f.indexOf('\n\n',e-200);if(nb!==-1&&nb<e+500)e=nb;chapters.push({title:`第 ${n} 段`,content:f.slice(i,e).trim()});i=e;n++;}}}
  return chapters.filter(c=>c.content.length>0);
}

// CRUD
window.saveBook = async () => {
  const title=document.getElementById('inputTitle').value.trim();
  const category=document.getElementById('inputCategory').value.trim();
  const rawText=document.getElementById('inputText').value.trim();
  const emoji=getSelectedEmoji();
  const editId=document.getElementById('editingBookId').value;
  if(!title){showToast('請輸入書名',false);return;}
  if(!rawText){showToast('請輸入書本內文',false);return;}
  const chapters=parseChapters(rawText);
  if(editId){
    const idx=books.findIndex(b=>b.id===editId);
    if(idx>=0){books[idx]={...books[idx],title,category,emoji,rawText,chapters};await saveBookToFirestore(books[idx]);}
    showToast('書本已更新 ✓',true);
  } else {
    const book={id:Date.now().toString(),title,category,emoji,rawText,chapters,progress:{chapterIdx:0,charOffset:0},note:'',addedAt:Date.now()};
    books.unshift(book); await saveBookToFirestore(book);
    showToast(`《${title}》已加入書架 ✓`,true);
  }
  clearForm(); renderShelf(); renderMyBooksList();
};

window.editBook = (id) => {
  const book=books.find(b=>b.id===id); if(!book)return;
  switchTab('add');
  document.getElementById('editingBookId').value=id;
  document.getElementById('inputTitle').value=book.title;
  document.getElementById('inputCategory').value=book.category||'';
  document.getElementById('inputText').value=book.rawText||'';
  document.getElementById('charCount').textContent=(book.rawText||'').length.toLocaleString()+' 字';
  document.getElementById('formTitle').textContent='✏️ 編輯書本';
  document.getElementById('cancelEditBtn').style.display='inline-flex';
  setTimeout(()=>{document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.toggle('selected',b.textContent===book.emoji));},50);
  window.scrollTo({top:0,behavior:'smooth'});
};

window.clearForm = () => {
  document.getElementById('editingBookId').value='';
  document.getElementById('inputTitle').value='';
  document.getElementById('inputCategory').value='';
  document.getElementById('inputText').value='';
  document.getElementById('charCount').textContent='0 字';
  document.getElementById('formTitle').textContent='📝 新增書本';
  document.getElementById('cancelEditBtn').style.display='none';
  renderEmojiPicker();
};

window.deleteBook = async (id,e) => {
  if(e)e.stopPropagation();
  if(!confirm('確定要刪除這本書嗎？'))return;
  books=books.filter(b=>b.id!==id); await deleteBookFromFirestore(id);
  renderShelf(); renderMyBooksList(); showToast('已刪除',false);
};

// RENDER
function hashColor(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return Math.abs(h)%360;}

function renderShelf() {
  const cats=['全部',...new Set(books.map(b=>b.category||'未分類').filter(Boolean))];
  const bar=document.getElementById('catBar'); bar.innerHTML='';
  cats.forEach(c=>{const b=document.createElement('button');b.className=`cat-chip${c===activeCategory?' active':''}`;b.textContent=c;b.onclick=()=>{activeCategory=c;renderShelf();};bar.appendChild(b);});
  const filtered=activeCategory==='全部'?books:books.filter(b=>(b.category||'未分類')===activeCategory);
  document.getElementById('bookCount').textContent=`${filtered.length} 本書`;
  const grid=document.getElementById('bookGrid'); grid.innerHTML='';
  if(!filtered.length){grid.innerHTML=`<div class="empty-shelf"><div class="empty-icon">📭</div><p>書架空空的，去「管理書本」新增第一本書吧！</p></div>`;return;}
  filtered.forEach(book=>{
    const tc=(book.chapters||[]).reduce((a,c)=>a+c.content.length,0);
    const p=book.progress||{chapterIdx:0};
    const cr=(book.chapters||[]).slice(0,p.chapterIdx).reduce((a,c)=>a+c.content.length,0);
    const pct=tc>0?Math.min(100,Math.round(cr/tc*100)):0;
    const card=document.createElement('div'); card.className='book-card'; card.onclick=()=>openReader(book.id);
    card.innerHTML=`<div class="book-cover" style="background:linear-gradient(135deg,hsl(${hashColor(book.id)},25%,15%),hsl(${hashColor(book.id)},20%,10%))"><span style="font-size:3rem;z-index:1">${book.emoji||'📚'}</span><div class="book-progress-bar"><div class="book-progress-fill" style="width:${pct}%"></div></div></div>${book.category?`<div class="book-cat-badge">${book.category}</div>`:''}<div class="book-card-actions"><button class="book-action-btn" onclick="event.stopPropagation();editBook('${book.id}')" title="編輯">✏️</button><button class="book-action-btn del" onclick="deleteBook('${book.id}',event)" title="刪除">🗑</button></div><div class="book-info"><div class="book-title">${book.title}</div><div class="book-meta">${pct>0?pct+'% · ':''}${(book.chapters||[]).length} 章節</div></div>`;
    grid.appendChild(card);
  });
}

function renderMyBooksList() {
  const list=document.getElementById('myBooksList');
  if(!books.length){list.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--text-dim);font-size:0.85rem">還沒有書本，快去新增吧！</div>`;return;}
  list.innerHTML='';
  books.forEach(book=>{
    const div=document.createElement('div'); div.className='my-book-item'; div.onclick=()=>openReader(book.id);
    div.innerHTML=`<div class="my-book-emoji">${book.emoji||'📚'}</div><div class="my-book-info"><div class="my-book-title">${book.title}</div><div class="my-book-meta">${book.category||'未分類'} · ${(book.chapters||[]).length} 章節</div></div><div class="my-book-actions"><button class="book-action-btn" onclick="event.stopPropagation();editBook('${book.id}')">✏️</button><button class="book-action-btn del" onclick="deleteBook('${book.id}',event)">🗑</button></div>`;
    list.appendChild(div);
  });
}

// READER
window.openReader = (bookId) => {
  stopTTS(); currentBookId=bookId;
  const book=books.find(b=>b.id===bookId); if(!book)return;
  currentChapterIdx=(book.progress?.chapterIdx)||0;
  if(currentChapterIdx>=(book.chapters||[]).length)currentChapterIdx=0;
  document.getElementById('readerCategory').textContent=book.category||'';
  document.getElementById('readerTitle').textContent=book.title;
  const cover=document.getElementById('readerCoverBig');
  cover.style.background=`linear-gradient(135deg,hsl(${hashColor(bookId)},25%,18%),hsl(${hashColor(bookId)},20%,10%))`;
  cover.innerHTML=`<span style="font-size:4.5rem">${book.emoji||'📚'}</span>`;
  document.getElementById('noteArea').value=book.note||'';
  renderChapterList(); loadChapter(currentChapterIdx); updateProgress();
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
  document.getElementById('tabReader').classList.add('active');
};

window.closeReader = () => {
  stopTTS();
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
  document.getElementById(activeTab==='add'?'tabAdd':'tabShelf').classList.add('active');
  renderShelf();
};

function renderChapterList() {
  const book=books.find(b=>b.id===currentBookId); if(!book)return;
  const list=document.getElementById('chapterList'); list.innerHTML='';
  (book.chapters||[]).forEach((ch,i)=>{
    const d=document.createElement('div'); d.className=`chapter-item${i===currentChapterIdx?' active':''}`;
    d.innerHTML=`<span class="chapter-num">${i+1}</span><span>${ch.title}</span>${i<currentChapterIdx?'<span class="chapter-done">✓</span>':''}`;
    d.onclick=()=>jumpToChapter(i); list.appendChild(d);
  });
}

function loadChapter(idx) {
  const book=books.find(b=>b.id===currentBookId); if(!book||!book.chapters[idx])return;
  currentChapterIdx=idx;
  const text=book.chapters[idx].content;
  document.getElementById('textDisplay').textContent=text;
  const rate=parseFloat(document.getElementById('speedSelect')?.value||1);
  chapterDuration=Math.round(text.length/(200*rate)*60); chapterElapsed=0;
  updateSeekUI(); renderChapterList();
}

function updateSeekUI() {
  const pct=chapterDuration>0?(chapterElapsed/chapterDuration*100):0;
  document.getElementById('seekBar').value=pct;
  document.getElementById('timeElapsed').textContent=fmt(chapterElapsed);
  document.getElementById('timeTotal').textContent=fmt(chapterDuration);
}
function fmt(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return `${m}:${sec.toString().padStart(2,'0')}`;}

window.onSeek=()=>{
  const pct=parseFloat(document.getElementById('seekBar').value)/100;
  chapterElapsed=Math.round(pct*chapterDuration); updateSeekUI();
  if(isPlaying){stopTTS();const book=books.find(b=>b.id===currentBookId);if(!book)return;speakFrom(book.chapters[currentChapterIdx].content,Math.round(pct*book.chapters[currentChapterIdx].content.length));}
};

// TTS
window.togglePlay=()=>{isPlaying?pauseTTS():startTTS();};
function startTTS(){
  const book=books.find(b=>b.id===currentBookId); if(!book||!book.chapters[currentChapterIdx])return;
  const text=book.chapters[currentChapterIdx].content;
  speakFrom(text,Math.round(parseFloat(document.getElementById('seekBar').value)/100*text.length));
}
function speakFrom(text,startChar=0){
  window.speechSynthesis.cancel();
  const seg=text.slice(startChar); if(!seg.trim()){skipChapter(1);return;}
  utterance=new SpeechSynthesisUtterance(seg);
  if(selectedVoice)utterance.voice=selectedVoice;
  utterance.rate=parseFloat(document.getElementById('speedSelect').value||1);
  utterance.lang=selectedVoice?.lang||'zh-TW';
  utterance.onstart=()=>{isPlaying=true;document.getElementById('playBtn').textContent='⏸';startSeekSim();};
  utterance.onboundary=(e)=>{
    const ci=startChar+(e.charIndex||0);const pct=text.length>0?ci/text.length:0;
    chapterElapsed=Math.round(pct*chapterDuration);updateSeekUI();
    highlightWord(e.charIndex,e.charLength,text,startChar);saveProgress(Math.floor(pct*text.length));
  };
  utterance.onend=()=>{
    isPlaying=false;document.getElementById('playBtn').textContent='▶';stopSeekSim();
    const book=books.find(b=>b.id===currentBookId);
    if(book&&currentChapterIdx<book.chapters.length-1)setTimeout(()=>{jumpToChapter(currentChapterIdx+1);startTTS();},600);
    else showToast('🎉 全書播放完畢！',true);
  };
  utterance.onerror=(e)=>{if(e.error!=='interrupted')console.warn(e.error);isPlaying=false;document.getElementById('playBtn').textContent='▶';stopSeekSim();};
  window.speechSynthesis.speak(utterance);
}
function pauseTTS(){window.speechSynthesis.pause();isPlaying=false;document.getElementById('playBtn').textContent='▶';stopSeekSim();}
function stopTTS(){window.speechSynthesis.cancel();isPlaying=false;const b=document.getElementById('playBtn');if(b)b.textContent='▶';stopSeekSim();}
function startSeekSim(){stopSeekSim();const r=parseFloat(document.getElementById('speedSelect').value||1);seekSim=setInterval(()=>{chapterElapsed=Math.min(chapterElapsed+1,chapterDuration);updateSeekUI();},1000/r);}
function stopSeekSim(){if(seekSim){clearInterval(seekSim);seekSim=null;}}

window.rewind=()=>{chapterElapsed=Math.max(0,chapterElapsed-15);updateSeekUI();if(isPlaying){const b=books.find(x=>x.id===currentBookId);if(b){const t=b.chapters[currentChapterIdx].content;stopTTS();speakFrom(t,Math.round(chapterDuration>0?chapterElapsed/chapterDuration*t.length:0));}}};
window.forward=()=>{chapterElapsed=Math.min(chapterDuration,chapterElapsed+15);updateSeekUI();if(isPlaying){const b=books.find(x=>x.id===currentBookId);if(b){const t=b.chapters[currentChapterIdx].content;stopTTS();speakFrom(t,Math.round(chapterDuration>0?chapterElapsed/chapterDuration*t.length:0));}}};
window.setSpeed=()=>{if(isPlaying){const b=books.find(x=>x.id===currentBookId);if(b){const t=b.chapters[currentChapterIdx].content;const p=chapterDuration>0?chapterElapsed/chapterDuration:0;stopTTS();speakFrom(t,Math.round(p*t.length));}}const b=books.find(x=>x.id===currentBookId);if(b&&b.chapters[currentChapterIdx]){const r=parseFloat(document.getElementById('speedSelect').value||1);chapterDuration=Math.round(b.chapters[currentChapterIdx].content.length/(200*r)*60);updateSeekUI();}};
window.skipChapter=(dir)=>{const b=books.find(x=>x.id===currentBookId);if(!b)return;const ni=currentChapterIdx+dir;if(ni<0||ni>=b.chapters.length)return;const was=isPlaying;stopTTS();jumpToChapter(ni);if(was||dir>0)setTimeout(startTTS,300);};
window.jumpToChapter=(idx)=>{const was=isPlaying;stopTTS();loadChapter(idx);saveProgress(0,idx);updateProgress();if(was)setTimeout(startTTS,300);};

function saveProgress(charOffset,chapterIdx=currentChapterIdx){
  const idx=books.findIndex(b=>b.id===currentBookId);if(idx<0)return;
  books[idx].progress={chapterIdx,charOffset};saveBookToFirestore(books[idx]);
}
function updateProgress(){
  const book=books.find(b=>b.id===currentBookId);if(!book)return;
  const tc=(book.chapters||[]).reduce((a,c)=>a+c.content.length,0);
  const p=book.progress||{chapterIdx:0};
  const cr=(book.chapters||[]).slice(0,p.chapterIdx).reduce((a,c)=>a+c.content.length,0);
  const pct=tc>0?Math.min(100,Math.round(cr/tc*100)):0;
  const circ=138.2;document.getElementById('ringCircle').style.strokeDashoffset=circ-(pct/100)*circ;
  document.getElementById('ringPct').textContent=pct+'%';
  const ch=book.chapters[p.chapterIdx];
  document.getElementById('progressLabel').textContent=ch?ch.title:'已完成';
  document.getElementById('progressSub').textContent=`第 ${p.chapterIdx+1} / ${book.chapters.length} 章 · ${pct}% 完成`;
}
function highlightWord(ci,cl,ft,offset){
  const d=document.getElementById('textDisplay');const t=ft.slice(offset);if(ci===undefined)return;
  d.innerHTML=esc(t.slice(0,ci))+`<span class="highlight">${esc(t.slice(ci,ci+(cl||1)))}</span>`+esc(t.slice(ci+(cl||1)));
  d.querySelector('.highlight')?.scrollIntoView({block:'center',behavior:'smooth'});
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// SLEEP
window.setSleep=()=>{
  clearSleepTimer();const mins=parseInt(document.getElementById('sleepSelect').value);if(!mins)return;
  sleepEndTime=Date.now()+mins*60000;
  sleepTimer=setTimeout(()=>{stopTTS();showToast('🌙 睡眠定時到，已停止',true);clearSleepTimer();document.getElementById('sleepSelect').value='0';},mins*60000);
  document.getElementById('sleepIndicator').classList.add('active');
  document.getElementById('sleepGroup').classList.add('sleep-active');
  sleepInterval=setInterval(()=>{if(!sleepEndTime)return;const r=Math.max(0,sleepEndTime-Date.now());const m=Math.floor(r/60000),s=Math.floor((r%60000)/1000);document.getElementById('sleepCountdown').textContent=`睡眠定時：${m}:${s.toString().padStart(2,'0')}`;if(r===0)clearSleepTimer();},500);
  showToast(`🌙 ${mins} 分鐘後自動停止`,true);
};
function clearSleepTimer(){if(sleepTimer){clearTimeout(sleepTimer);sleepTimer=null;}if(sleepInterval){clearInterval(sleepInterval);sleepInterval=null;}sleepEndTime=null;document.getElementById('sleepIndicator')?.classList.remove('active');document.getElementById('sleepGroup')?.classList.remove('sleep-active');}

// NOTES
window.saveNote=()=>{const idx=books.findIndex(b=>b.id===currentBookId);if(idx<0)return;books[idx].note=document.getElementById('noteArea').value;saveBookToFirestore(books[idx]);};

// VOICES
function loadVoices(){
  voices=window.speechSynthesis.getVoices();const sel=document.getElementById('voiceSelect');sel.innerHTML='';
  const zh=voices.filter(v=>v.lang.startsWith('zh')||v.lang.startsWith('cmn'));
  const others=voices.filter(v=>!v.lang.startsWith('zh')&&!v.lang.startsWith('cmn'));
  [...zh,...others].forEach(v=>{const o=document.createElement('option');o.value=voices.indexOf(v);o.textContent=`${v.name} (${v.lang})`;sel.appendChild(o);});
  if(zh.length>0){selectedVoice=zh[0];sel.value=voices.indexOf(zh[0]);}
  else if(voices.length>0)selectedVoice=voices[0];
}
window.setVoice=()=>{const i=parseInt(document.getElementById('voiceSelect').value);if(!isNaN(i))selectedVoice=voices[i];};
window.addEventListener('load',()=>{loadVoices();window.speechSynthesis.onvoiceschanged=loadVoices;});

// TOAST
let toastTimer;
window.showToast=(msg,gold=false)=>{const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show${gold?' gold':''}`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);};
</script>
</body>
</html>
