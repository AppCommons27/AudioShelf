<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AudioShelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0e0c0a;--surface:#181410;--card:#201c17;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --gold:#c9943a;--gold-l:#e8b96a;--gold-dim:rgba(201,148,58,0.15);
  --text:#e8e0d4;--text-dim:#8a7e6e;--text-mid:#b8a990;
  --green:#4a8a5a;--radius:12px;--shadow:0 8px 32px rgba(0,0,0,0.5);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100svh;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

/* LOGIN */
.login-screen{min-height:100svh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem;padding:2rem;background:radial-gradient(ellipse 60% 40% at 50% 30%,rgba(201,148,58,0.08) 0%,transparent 70%);}
.login-logo{font-family:'Playfair Display',serif;font-size:2.8rem;color:var(--gold);display:flex;align-items:center;gap:16px;}
.login-logo-icon{width:58px;height:58px;background:var(--gold-dim);border:1px solid var(--gold);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;}
.login-tagline{font-family:'Noto Serif TC',serif;color:var(--text-dim);font-size:0.95rem;text-align:center;line-height:1.8;}
.login-lang{display:flex;gap:8px;margin-bottom:-0.5rem;}
.lang-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:999px;padding:4px 14px;font-size:0.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.lang-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
.btn-google{display:flex;align-items:center;gap:12px;background:#fff;color:#1f1f1f;border:none;border-radius:8px;padding:13px 28px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.4);}
.btn-google svg{width:20px;height:20px;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:60px;border-bottom:1px solid var(--border);background:rgba(14,12,10,0.92);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;}
.logo{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);display:flex;align-items:center;gap:10px;}
.logo-icon{width:28px;height:28px;background:var(--gold-dim);border:1px solid var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;}
.header-right{display:flex;align-items:center;gap:8px;}
.user-avatar{width:30px;height:30px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;}
.user-name{font-size:0.78rem;color:var(--text-mid);}
.btn-small{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:8px;padding:4px 10px;font-size:0.72rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.btn-small:hover{border-color:var(--border2);color:var(--text);}
.btn-kofi{display:flex;align-items:center;gap:5px;background:#FF5E5B;color:#fff;border-radius:8px;padding:5px 10px;font-size:0.78rem;font-weight:600;text-decoration:none;transition:all 0.15s;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.btn-kofi:hover{background:#ff4542;transform:translateY(-1px);box-shadow:0 3px 10px rgba(255,94,91,0.3);}
@media(max-width:500px){.btn-kofi span{display:none;}}
.btn-lang{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}

/* TABS */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 1.5rem;position:sticky;top:60px;z-index:90;}
.tab-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;color:var(--text-dim);padding:13px 18px;border-bottom:2px solid transparent;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:1.5rem;}
.tab-view{display:none;animation:fadeIn 0.2s ease;}
.tab-view.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SHELF */
.shelf-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;}
.shelf-title{font-family:'Playfair Display',serif;font-size:1.8rem;}
.shelf-title span{color:var(--gold);font-style:italic;}
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1.1rem;}
.book-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all 0.2s;position:relative;}
.book-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:var(--shadow);}
.book-cover{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;overflow:hidden;}
.book-progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.1);}
.book-progress-fill{height:100%;background:var(--gold);transition:width 0.3s;}
.book-info{padding:0.7rem;}
.book-title{font-family:'Noto Serif TC',serif;font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.book-meta{font-size:0.7rem;color:var(--text-dim);}
.book-card-actions{position:absolute;top:6px;right:6px;display:flex;gap:3px;opacity:0;transition:opacity 0.15s;}
.book-card:hover .book-card-actions{opacity:1;}
.bab{width:26px;height:26px;border-radius:5px;background:rgba(14,12,10,0.8);border:1px solid var(--border2);backdrop-filter:blur(4px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.72rem;color:var(--text-dim);transition:all 0.15s;}
.bab:hover{color:var(--text);}
.bab.del:hover{color:#e08080;}
.empty-shelf{text-align:center;padding:5rem 2rem;color:var(--text-dim);}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:0.4;}

/* MANAGE TAB */
.add-tab-layout{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start;}
@media(max-width:700px){.add-tab-layout{grid-template-columns:1fr;}}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;}
.form-card h2{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:1rem;color:var(--text);}
.form-group{margin-bottom:0.9rem;}
label{display:block;font-size:0.7rem;font-weight:500;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px;}
input[type="text"],textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.15s;resize:vertical;}
input:focus,textarea:focus{border-color:var(--gold);}
input::placeholder,textarea::placeholder{color:var(--text-dim);}
.char-count{font-size:0.68rem;color:var(--text-dim);text-align:right;margin-top:3px;}
.my-books-list{display:flex;flex-direction:column;gap:7px;}
.my-book-item{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all 0.15s;}
.my-book-item:hover{border-color:var(--border2);}
.my-book-emoji{font-size:1.4rem;flex-shrink:0;}
.my-book-info{flex:1;min-width:0;}
.my-book-title{font-size:0.83rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.my-book-meta{font-size:0.7rem;color:var(--text-dim);}
.my-book-actions{display:flex;gap:3px;flex-shrink:0;}

/* SELECT EXPORT */
.select-book-list{display:flex;flex-direction:column;gap:5px;margin-bottom:0.75rem;}
.select-book-label{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:0.83rem;color:var(--text);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.83rem;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;}
.btn-gold{background:var(--gold);color:#0e0c0a;}
.btn-gold:hover{background:var(--gold-l);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);}

/* READER */
.reader-back{display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:0.85rem;font-family:'DM Sans',sans-serif;padding:0;margin-bottom:1.5rem;transition:color 0.15s;}
.reader-back:hover{color:var(--gold);}
.reader-layout{display:grid;grid-template-columns:180px 1fr;gap:2rem;align-items:start;}
@media(max-width:640px){.reader-layout{grid-template-columns:1fr;}}
.reader-cover-big{width:100%;aspect-ratio:2/3;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:4rem;border:1px solid var(--border);}
.reader-category{font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:0.3rem;}
.reader-title{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,3vw,1.9rem);line-height:1.2;margin-bottom:1.1rem;}
.progress-ring-wrap{display:flex;align-items:center;gap:1rem;margin-bottom:1.1rem;}
.progress-ring{position:relative;width:54px;height:54px;flex-shrink:0;}
.progress-ring svg{transform:rotate(-90deg);}
.progress-ring circle{transition:stroke-dashoffset 0.4s ease;}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.66rem;font-weight:600;color:var(--gold);}
.progress-text{font-size:0.76rem;color:var(--text-dim);line-height:1.6;}
.progress-text strong{color:var(--text);display:block;}
.player-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:1.1rem;}
.seek-bar-wrap{margin-bottom:0.9rem;}
.seek-labels{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--text-dim);margin-bottom:4px;}
.seek-bar{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:99px;background:var(--border2);outline:none;cursor:pointer;}
.seek-bar::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--gold);cursor:pointer;}
.player-controls{display:flex;align-items:center;justify-content:center;gap:0.7rem;margin-bottom:0.9rem;}
.ctrl-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);transition:all 0.15s;display:flex;align-items:center;justify-content:center;font-size:1rem;width:36px;height:36px;border-radius:50%;}
.ctrl-btn:hover{color:var(--text);background:var(--border);}
.ctrl-play{width:48px;height:48px;background:var(--gold);color:#0e0c0a;border-radius:50%;font-size:1.2rem;flex-shrink:0;}
.ctrl-play:hover{background:var(--gold-l);}
.player-settings{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.setting-group{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 9px;font-size:0.73rem;color:var(--text-dim);}
.setting-group select{background:none;border:none;color:var(--text);font-size:0.73rem;padding:0;width:auto;outline:none;}
.sleep-active{border-color:rgba(201,148,58,0.4);color:var(--gold);}
.text-display-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;max-height:260px;overflow-y:auto;margin-bottom:1.1rem;}
.text-display{font-family:'Noto Serif TC',serif;font-size:0.9rem;line-height:2;color:var(--text-mid);white-space:pre-wrap;word-break:break-word;}
.text-display .hl{background:var(--gold-dim);color:var(--gold-l);border-radius:3px;padding:0 2px;}
.chapter-section h3{font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.5rem;}
.chapter-list{display:flex;flex-direction:column;gap:3px;}
.chapter-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background 0.15s;font-size:0.8rem;color:var(--text-dim);border:1px solid transparent;}
.chapter-item:hover{background:var(--card);}
.chapter-item.active{background:var(--gold-dim);color:var(--gold);border-color:rgba(201,148,58,0.2);}
.chapter-num{font-size:0.65rem;color:var(--text-dim);width:18px;flex-shrink:0;}
.chapter-done{color:var(--green);font-size:0.65rem;margin-left:auto;}
.notes-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-top:1rem;}
.notes-card h3{font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.5rem;}
.notes-card textarea{min-height:85px;font-size:0.83rem;}

/* MINI PLAYER */
.mini-player{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(24,20,16,0.97);border-top:1px solid var(--border2);backdrop-filter:blur(16px);padding:10px 1.25rem;display:none;align-items:center;gap:0.75rem;}
.mini-player.active{display:flex;}
.mini-player-info{flex:1;min-width:0;}
.mini-title{font-size:0.8rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-chapter{font-size:0.68rem;color:var(--text-dim);margin-top:1px;}
.mini-play{width:42px;height:42px;border-radius:50%;background:var(--gold);color:#0e0c0a;border:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.mini-play:hover{background:var(--gold-l);}
.mini-ctrl{width:34px;height:34px;border-radius:50%;background:transparent;color:var(--text-dim);border:1px solid var(--border);cursor:pointer;font-size:0.82rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.mini-ctrl:hover{color:var(--text);border-color:var(--border2);}

/* SLEEP */
.sleep-indicator{position:fixed;top:70px;right:1rem;background:var(--surface);border:1px solid rgba(201,148,58,0.3);border-radius:999px;padding:5px 13px;font-size:0.72rem;color:var(--gold);display:none;align-items:center;gap:6px;z-index:90;}
.sleep-indicator.active{display:flex;}
.sleep-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.5s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(1.3)}}

/* TOAST */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border2);border-radius:999px;padding:9px 18px;font-size:0.8rem;color:var(--text);box-shadow:var(--shadow);z-index:500;pointer-events:none;opacity:0;transition:opacity 0.2s;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.gold{border-color:rgba(201,148,58,0.4);color:var(--gold);}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:1rem;}
.loading-spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:0.82rem;color:var(--text-dim);}

/* GENERATE TAB */
.provider-tab{flex:1;background:transparent;border:none;border-radius:7px;padding:7px 10px;font-size:0.8rem;font-family:'DM Sans',sans-serif;color:var(--text-dim);cursor:pointer;transition:all 0.15s;font-weight:500;}
.provider-tab:hover{color:var(--text);}
.provider-tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3);}
#genLangZh.active,#genLangEn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
.gen-cursor{display:inline-block;width:2px;height:1em;background:var(--gold);margin-left:2px;animation:blink 1s ease infinite;vertical-align:middle;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

body::after{content:'';position:fixed;top:0;left:0;right:0;height:280px;background:radial-gradient(ellipse 60% 40% at 80% 0%,rgba(201,148,58,0.05) 0%,transparent 70%);pointer-events:none;z-index:0;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">載入中…</div>
</div>

<div class="sleep-indicator" id="sleepIndicator">
  <div class="sleep-dot"></div>
  <span id="sleepCountdown"></span>
</div>

<!-- LOGIN -->
<div id="loginScreen" style="display:none">
  <div class="login-screen">
    <div class="login-lang">
      <button class="lang-btn active" onclick="setLang('zh')" id="loginLangZh">繁中</button>
      <button class="lang-btn" onclick="setLang('en')" id="loginLangEn">EN</button>
    </div>
    <div class="login-logo">
      <div class="login-logo-icon">📖</div>
      AudioShelf
    </div>
    <div class="login-tagline" id="loginTagline"></div>
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      <span id="loginBtnText"></span>
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">
  <header>
    <div class="logo"><div class="logo-icon">📖</div>AudioShelf</div>
    <div class="header-right">
      <a href="https://ko-fi.com/appcommons" target="_blank" rel="noopener" class="btn-kofi" id="btnKofi">☕ <span id="kofiText"></span></a>
      <button class="btn-small btn-lang" onclick="toggleLang()" id="langToggleBtn">EN</button>
      <img class="user-avatar" id="userAvatar" src="" alt="" />
      <span class="user-name" id="userName"></span>
      <button class="btn-small" onclick="signOut()" id="signOutBtn"></button>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" id="tabShelfBtn" onclick="switchTab('shelf')"></button>
    <button class="tab-btn" id="tabAddBtn" onclick="switchTab('add')"></button>
    <button class="tab-btn" id="tabGenBtn" onclick="switchTab('gen')"></button>
  </div>

  <main>
    <!-- SHELF -->
    <div class="tab-view active" id="tabShelf">
      <div class="shelf-header">
        <h1 class="shelf-title" id="shelfTitle"></h1>
        <div style="font-size:0.78rem;color:var(--text-dim)" id="bookCount"></div>
      </div>
      <div class="book-grid" id="bookGrid"></div>
    </div>

    <!-- MANAGE -->
    <div class="tab-view" id="tabAdd">
      <div class="add-tab-layout">
        <div>
          <div class="form-card">
            <h2 id="formTitle"></h2>
            <input type="hidden" id="editingBookId" value="" />
            <div class="form-group">
              <label id="labelTitle"></label>
              <input type="text" id="inputTitle" />
            </div>
            <div class="form-group">
              <label id="labelContent"></label>
              <textarea id="inputText" rows="10"></textarea>
              <div class="char-count" id="charCount">0</div>
            </div>
            <div style="display:flex;gap:0.6rem;flex-wrap:wrap">
              <button class="btn btn-gold" onclick="saveBook()" style="flex:1" id="btnSave"></button>

    const snap = await getDocs(query(collection(db,'books'), where('uid','==',currentUser.uid)));
    books = snap.docs.map(d=>({id:d.id,...d.data()}));
    books.sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
  } catch(e) { showToast(t('loadFail'), false); }
}
async function saveBookToFS(book) {
  try { await setDoc(doc(db,'books',book.id), {...book, uid:currentUser.uid}); }
  catch(e) { showToast(t('saveFail'), false); }
}
async function deleteBookFromFS(id) {
  try { await deleteDoc(doc(db,'books',id)); }
  catch(e) { showToast(t('deleteFail'), false); }
}

  activeTab=tab;
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));

  document.getElementById(btnMap[tab])?.classList.add('active');

// ── CHAPTERS ──
function parseChapters(text) {
  const re=/^(第[零一二三四五六七八九十百千\d]+[章节回部篇]\s*.+|Chapter\s*\d+\s*.+|Part\s*\d+\s*.+|={3,})/im;
  const lines=text.split('\n'); let chapters=[],title='Chapter 1',lines2=[],hasEx=false;
  lines.forEach(l=>{ const tr=l.trim();
    if(re.test(tr)&&tr.length<80){if(lines2.join('').trim())chapters.push({title,content:lines2.join('\n').trim()});title=tr==='==='?`Part ${chapters.length+1}`:tr;lines2=[];hasEx=true;}
    else lines2.push(l);
  });
  if(lines2.join('').trim())chapters.push({title,content:lines2.join('\n').trim()});
  if(!hasEx||chapters.length===1){const f=text.trim();if(f.length>2000){chapters=[];let i=0,n=1;while(i<f.length){let e=i+1500;const nb=f.indexOf('\n\n',e-200);if(nb!==-1&&nb<e+500)e=nb;chapters.push({title:`Part ${n}`,content:f.slice(i,e).trim()});i=e;n++;}}}
  return chapters.filter(c=>c.content.length>0);
}

// ── CRUD ──
window.saveBook = async () => {
  const title=document.getElementById('inputTitle').value.trim();
  const rawText=document.getElementById('inputText').value.trim();
  const editId=document.getElementById('editingBookId').value;
  if(!title){showToast(t('noTitle'),false);return;}
  if(!rawText){showToast(t('noContent'),false);return;}
  const chapters=parseChapters(rawText);
  if(editId){
    const idx=books.findIndex(b=>b.id===editId);
    if(idx>=0){books[idx]={...books[idx],title,rawText,chapters};await saveBookToFS(books[idx]);}
    showToast(t('bookSaved'),true);
  } else {
    const book={id:Date.now().toString(),title,emoji:'📚',rawText,chapters,progress:{chapterIdx:0,charOffset:0},note:'',addedAt:Date.now()};
    books.unshift(book); await saveBookToFS(book);
    showToast(t('bookAdded'),true);
  }
  clearForm(); renderShelf(); renderMyBooksList();
};

window.editBook = (id) => {
  const book=books.find(b=>b.id===id); if(!book)return;
  switchTab('add');
  document.getElementById('editingBookId').value=id;
  document.getElementById('inputTitle').value=book.title;
  document.getElementById('inputText').value=book.rawText||'';
  document.getElementById('charCount').textContent=(book.rawText||'').length.toLocaleString()+' '+t('chars');
  document.getElementById('formTitle').textContent=t('formEdit');
  document.getElementById('cancelEditBtn').style.display='inline-flex';
  window.scrollTo({top:0,behavior:'smooth'});
};

window.clearForm = () => {
  document.getElementById('editingBookId').value='';
  document.getElementById('inputTitle').value='';
  document.getElementById('inputText').value='';
  document.getElementById('charCount').textContent='0 '+t('chars');
  document.getElementById('formTitle').textContent=t('formNew');
  document.getElementById('cancelEditBtn').style.display='none';
};

window.deleteBook = async (id,e) => {
  if(e)e.stopPropagation();
  if(!confirm(t('confirmDelete')))return;
  books=books.filter(b=>b.id!==id); await deleteBookFromFS(id);
  renderShelf(); renderMyBooksList(); showToast(t('deleted'),false);
};

// ── RENDER ──
function hc(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return Math.abs(h)%360;}

function renderShelf() {
  document.getElementById('bookCount').textContent=`${books.length} ${t('books')}`;
  const grid=document.getElementById('bookGrid'); grid.innerHTML='';
  if(!books.length){grid.innerHTML=`<div class="empty-shelf"><div class="empty-icon">📭</div><p>${t('emptyShelf')}</p></div>`;return;}
  books.forEach(book=>{
    const tc=(book.chapters||[]).reduce((a,c)=>a+c.content.length,0);
    const p=book.progress||{chapterIdx:0};
    const cr=(book.chapters||[]).slice(0,p.chapterIdx).reduce((a,c)=>a+c.content.length,0);
    const pct=tc>0?Math.min(100,Math.round(cr/tc*100)):0;
    const card=document.createElement('div'); card.className='book-card'; card.onclick=()=>openReader(book.id);
    card.innerHTML=`<div class="book-cover" style="background:linear-gradient(135deg,hsl(${hc(book.id)},25%,15%),hsl(${hc(book.id)},20%,10%))"><span style="font-size:3rem">${book.emoji||'📚'}</span><div class="book-progress-bar"><div class="book-progress-fill" style="width:${pct}%"></div></div></div><div class="book-card-actions"><button class="bab" onclick="event.stopPropagation();editBook('${book.id}')">✏️</button><button class="bab del" onclick="deleteBook('${book.id}',event)">🗑</button></div><div class="book-info"><div class="book-title">${book.title}</div><div class="book-meta">${pct>0?pct+'% · ':''}${(book.chapters||[]).length} ch</div></div>`;
    grid.appendChild(card);
  });
}

function renderMyBooksList() {
  const list=document.getElementById('myBooksList');
  if(!books.length){list.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--text-dim);font-size:0.82rem">${t('emptyBooks')}</div>`;return;}
  list.innerHTML='';
  books.forEach(book=>{
    const div=document.createElement('div'); div.className='my-book-item'; div.onclick=()=>openReader(book.id);
    div.innerHTML=`<div class="my-book-emoji">${book.emoji||'📚'}</div><div class="my-book-info"><div class="my-book-title">${book.title}</div><div class="my-book-meta">${(book.chapters||[]).length} ch</div></div><div class="my-book-actions"><button class="bab" onclick="event.stopPropagation();exportBook('${book.id}')" title="Export">📤</button><button class="bab" onclick="event.stopPropagation();editBook('${book.id}')">✏️</button><button class="bab del" onclick="deleteBook('${book.id}',event)">🗑</button></div>`;
    list.appendChild(div);
  });
}

// ── EXPORT / IMPORT ──
function makeExportData(selected) {
  return {version:'1.0',exportedAt:new Date().toISOString(),exportedBy:currentUser?.displayName||'',bookCount:selected.length,
    books:selected.map(b=>({title:b.title,emoji:b.emoji||'📚',rawText:b.rawText,chapters:b.chapters,addedAt:b.addedAt}))};
}
function downloadJSON(data, filename) {
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

window.exportAllBooks = () => {
  if(!books.length){showToast(t('emptyBookshelf'),false);return;}
  downloadJSON(makeExportData(books),`audioshelf-all-${new Date().toISOString().slice(0,10)}.json`);
  showToast(t('exportedAll',{n:books.length}),true);
};

window.exportBook = (id) => {
  const book=books.find(b=>b.id===id); if(!book)return;
  downloadJSON(makeExportData([book]),`audioshelf-${book.title.replace(/\s+/g,'-')}.json`);
  showToast(t('exportedSel',{n:1}),true);
};

window.toggleSelectExport = () => {
  const panel=document.getElementById('selectExportPanel');
  const isOpen=panel.style.display!=='none';
  panel.style.display=isOpen?'none':'block';
  document.getElementById('selectExportBtn').textContent=isOpen?t('btnSelectExport'):t('btnCancelSelect');

function renderSelectList() {
  const list=document.getElementById('selectBookList'); list.innerHTML='';
  books.forEach(book=>{
    const lbl=document.createElement('label'); lbl.className='select-book-label';
    lbl.innerHTML=`<input type="checkbox" data-id="${book.id}" style="accent-color:var(--gold);width:15px;height:15px;" checked /><span>${book.emoji||'📚'}</span><span>${book.title}</span>`;

window.exportSelectedBooks = () => {

  if(!checked.length){showToast(t('selectAtLeast'),false);return;}
  const ids=checked.map(c=>c.dataset.id);
  const sel=books.filter(b=>ids.includes(b.id));
  downloadJSON(makeExportData(sel),`audioshelf-${sel.length}books-${new Date().toISOString().slice(0,10)}.json`);
  showToast(t('exportedSel',{n:sel.length}),true);
  toggleSelectExport();
};

window.importBook = (event) => {
  const file=event.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    try {
      const data=JSON.parse(e.target.result);
      const list=data.books?data.books:(data.book?[data.book]:[data]);
      if(!list.length||!list[0].title){showToast(t('importErr'),false);return;}
      let added=0;
      for(const bd of list){
        if(books.find(b=>b.title===bd.title))continue;
        const nb={id:Date.now().toString()+Math.random().toString(36).slice(2),title:bd.title,emoji:bd.emoji||'📚',rawText:bd.rawText,chapters:bd.chapters||parseChapters(bd.rawText||''),progress:{chapterIdx:0,charOffset:0},note:'',addedAt:Date.now()};
        books.unshift(nb); await saveBookToFS(nb); added++;
      }
      const skipped=list.length-added;
      renderShelf(); renderMyBooksList();
      if(added>0) showToast(t('importedOk',{n:added})+(skipped>0?' '+t('skipped',{n:skipped}):''),true);
      else showToast(t('alreadyHave'),false);
    }catch(err){showToast(t('importErr'),false);}
    event.target.value='';
  };
  reader.readAsText(file);
};

// ── READER ──
window.openReader = (bookId) => {
  stopTTS(); currentBookId=bookId;
  const book=books.find(b=>b.id===bookId); if(!book)return;
  currentChapterIdx=(book.progress?.chapterIdx)||0;
  if(currentChapterIdx>=(book.chapters||[]).length)currentChapterIdx=0;
  document.getElementById('readerCat').textContent='';
  document.getElementById('readerTitle').textContent=book.title;
  const cover=document.getElementById('readerCover');
  cover.style.background=`linear-gradient(135deg,hsl(${hc(bookId)},25%,18%),hsl(${hc(bookId)},20%,10%))`;
  cover.innerHTML=`<span style="font-size:4rem">${book.emoji||'📚'}</span>`;
  document.getElementById('noteArea').value=book.note||'';
  renderChapterList(); loadChapter(currentChapterIdx); updateProgress();
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
  document.getElementById('tabReader').classList.add('active');
};

window.closeReader = () => {
  stopTTS();
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
  document.getElementById(activeTab==='add'?'tabAdd':'tabShelf').classList.add('active');
  renderShelf();
};

function renderChapterList() {
  const book=books.find(b=>b.id===currentBookId); if(!book)return;
  const list=document.getElementById('chapterList'); list.innerHTML='';
  (book.chapters||[]).forEach((ch,i)=>{
    const d=document.createElement('div'); d.className=`chapter-item${i===currentChapterIdx?' active':''}`;
    d.innerHTML=`<span class="chapter-num">${i+1}</span><span>${ch.title}</span>${i<currentChapterIdx?'<span class="chapter-done">✓</span>':''}`;
    d.onclick=()=>jumpToChapter(i); list.appendChild(d);
  });
}

function loadChapter(idx) {
  const book=books.find(b=>b.id===currentBookId); if(!book||!book.chapters[idx])return;
  currentChapterIdx=idx;
  const text=book.chapters[idx].content;
  document.getElementById('textDisplay').textContent=text;
  const rate=parseFloat(document.getElementById('speedSelect')?.value||1);
  chapterDuration=Math.round(text.length/(200*rate)*60); chapterElapsed=0;
  updateSeekUI(); renderChapterList();
}

function updateSeekUI() {
  const pct=chapterDuration>0?(chapterElapsed/chapterDuration*100):0;
  document.getElementById('seekBar').value=pct;
  document.getElementById('timeElapsed').textContent=fmt(chapterElapsed);
  document.getElementById('timeTotal').textContent=fmt(chapterDuration);
}
function fmt(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return `${m}:${sec.toString().padStart(2,'0')}`;}

window.onSeek=()=>{
  const pct=parseFloat(document.getElementById('seekBar').value)/100;
  chapterElapsed=Math.round(pct*chapterDuration); updateSeekUI();
  if(isPlaying){const book=books.find(b=>b.id===currentBookId);if(!book)return;stopTTS();speakFrom(book.chapters[currentChapterIdx].content,Math.round(pct*book.chapters[currentChapterIdx].content.length));}
};

function updateProgress() {
  const book=books.find(b=>b.id===currentBookId); if(!book)return;
  const tc=(book.chapters||[]).reduce((a,c)=>a+c.content.length,0);
  const p=book.progress||{chapterIdx:0};
  const cr=(book.chapters||[]).slice(0,p.chapterIdx).reduce((a,c)=>a+c.content.length,0);
  const pct=tc>0?Math.min(100,Math.round(cr/tc*100)):0;
  const circ=131.9; document.getElementById('ringCircle').style.strokeDashoffset=circ-(pct/100)*circ;
  document.getElementById('ringPct').textContent=pct+'%';
  const ch=book.chapters[p.chapterIdx];
  document.getElementById('progressLabel').textContent=ch?ch.title:t('notStarted');
  document.getElementById('progressSub').textContent=`${t('chaptersLabel')} ${p.chapterIdx+1} ${t('chapterOf')} ${book.chapters.length} · ${pct}${t('pctDone')}`;
}

// ── TTS ──
window.togglePlay=()=>{isPlaying?pauseTTS():startTTS();};

function startTTS(){
  const book=books.find(b=>b.id===currentBookId); if(!book||!book.chapters[currentChapterIdx])return;
  const text=book.chapters[currentChapterIdx].content;
  speakFrom(text,Math.round(parseFloat(document.getElementById('seekBar').value)/100*text.length));
}

function speakFrom(text,startChar=0){
  window.speechSynthesis.cancel();
  const seg=text.slice(startChar); if(!seg.trim()){skipChapter(1);return;}
  utterance=new SpeechSynthesisUtterance(seg);
  if(selectedVoice)utterance.voice=selectedVoice;
  utterance.rate=parseFloat(document.getElementById('speedSelect').value||1);
  utterance.lang=selectedVoice?.lang||'zh-TW';
  utterance.onstart=()=>{
    isPlaying=true;
    document.getElementById('playBtn').textContent='⏸';
    document.getElementById('miniPlayBtn').textContent='⏸';
    startSeekSim(); showMiniPlayer();
  };
  utterance.onboundary=(e)=>{
    const ci=startChar+(e.charIndex||0); const pct=text.length>0?ci/text.length:0;
    chapterElapsed=Math.round(pct*chapterDuration); updateSeekUI();
    hl(e.charIndex,e.charLength,text,startChar); saveProgress(Math.floor(pct*text.length));
  };
  utterance.onend=()=>{
    isPlaying=false;
    document.getElementById('playBtn').textContent='▶';
    document.getElementById('miniPlayBtn').textContent='▶';
    stopSeekSim();
    const book=books.find(b=>b.id===currentBookId);
    if(book&&currentChapterIdx<book.chapters.length-1)setTimeout(()=>{jumpToChapter(currentChapterIdx+1);startTTS();},600);
    else{showToast(t('finished'),true);hideMiniPlayer();}
  };
  utterance.onerror=(e)=>{
    if(e.error!=='interrupted')console.warn(e.error);
    isPlaying=false;
    document.getElementById('playBtn').textContent='▶';
    document.getElementById('miniPlayBtn').textContent='▶';
    stopSeekSim();
  };
  window.speechSynthesis.speak(utterance);
}

// On iOS, pause() doesn't work — we cancel and resume from position
function pauseTTS(){
  window.speechSynthesis.cancel();
  isPlaying=false;
  document.getElementById('playBtn').textContent='▶';
  document.getElementById('miniPlayBtn').textContent='▶';
  stopSeekSim();
}
function stopTTS(){
  window.speechSynthesis.cancel();
  isPlaying=false;
  const b=document.getElementById('playBtn'); if(b)b.textContent='▶';
  const mb=document.getElementById('miniPlayBtn'); if(mb)mb.textContent='▶';
  stopSeekSim(); hideMiniPlayer();
}
function startSeekSim(){stopSeekSim();const r=parseFloat(document.getElementById('speedSelect').value||1);seekSim=setInterval(()=>{chapterElapsed=Math.min(chapterElapsed+1,chapterDuration);updateSeekUI();},1000/r);}
function stopSeekSim(){if(seekSim){clearInterval(seekSim);seekSim=null;}}

window.rewind=()=>{chapterElapsed=Math.max(0,chapterElapsed-15);updateSeekUI();if(isPlaying){const b=books.find(x=>x.id===currentBookId);if(b){const tt=b.chapters[currentChapterIdx].content;stopTTS();speakFrom(tt,Math.round(chapterDuration>0?chapterElapsed/chapterDuration*tt.length:0));}}};
window.forward=()=>{chapterElapsed=Math.min(chapterDuration,chapterElapsed+15);updateSeekUI();if(isPlaying){const b=books.find(x=>x.id===currentBookId);if(b){const tt=b.chapters[currentChapterIdx].content;stopTTS();speakFrom(tt,Math.round(chapterDuration>0?chapterElapsed/chapterDuration*tt.length:0));}}};
window.setSpeed=()=>{if(isPlaying){const b=books.find(x=>x.id===currentBookId);if(b){const tt=b.chapters[currentChapterIdx].content;const pp=chapterDuration>0?chapterElapsed/chapterDuration:0;stopTTS();speakFrom(tt,Math.round(pp*tt.length));}}const b=books.find(x=>x.id===currentBookId);if(b&&b.chapters[currentChapterIdx]){const r=parseFloat(document.getElementById('speedSelect').value||1);chapterDuration=Math.round(b.chapters[currentChapterIdx].content.length/(200*r)*60);updateSeekUI();}};
window.skipChapter=(dir)=>{const b=books.find(x=>x.id===currentBookId);if(!b)return;const ni=currentChapterIdx+dir;if(ni<0||ni>=b.chapters.length)return;const was=isPlaying;stopTTS();jumpToChapter(ni);if(was||dir>0)setTimeout(startTTS,300);};
window.jumpToChapter=(idx)=>{const was=isPlaying;stopTTS();loadChapter(idx);saveProgress(0,idx);updateProgress();if(was)setTimeout(startTTS,300);};

function saveProgress(charOffset,chapterIdx=currentChapterIdx){
  const idx=books.findIndex(b=>b.id===currentBookId);if(idx<0)return;
  books[idx].progress={chapterIdx,charOffset};saveBookToFS(books[idx]);
}

function hl(ci,cl,ft,offset){
  const d=document.getElementById('textDisplay'); const text=ft.slice(offset);
  if(ci===undefined)return;
  d.innerHTML=esc(text.slice(0,ci))+`<span class="hl">${esc(text.slice(ci,ci+(cl||1)))}</span>`+esc(text.slice(ci+(cl||1)));
  d.querySelector('.hl')?.scrollIntoView({block:'center',behavior:'smooth'});
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── MINI PLAYER ──
function showMiniPlayer(){
  const book=books.find(b=>b.id===currentBookId); if(!book)return;
  const ch=book.chapters[currentChapterIdx];
  document.getElementById('miniTitle').textContent=book.title;
  document.getElementById('miniChapter').textContent=ch?ch.title:'';
  document.getElementById('miniPlayer').classList.add('active');
}
function hideMiniPlayer(){document.getElementById('miniPlayer').classList.remove('active');}

// ── SLEEP ──
window.setSleep=()=>{
  clearSleepTimer();
  const mins=parseInt(document.getElementById('sleepSelect').value); if(!mins)return;
  sleepEndTime=Date.now()+mins*60000;
  sleepTimer=setTimeout(()=>{stopTTS();showToast(t('sleepStop'),true);clearSleepTimer();document.getElementById('sleepSelect').value='0';},mins*60000);
  document.getElementById('sleepIndicator').classList.add('active');
  document.getElementById('sleepGroup').classList.add('sleep-active');
  sleepInterval=setInterval(()=>{
    if(!sleepEndTime)return;
    const r=Math.max(0,sleepEndTime-Date.now());
    const m=Math.floor(r/60000),s=Math.floor((r%60000)/1000);
    document.getElementById('sleepCountdown').textContent=t('sleepTimer')+`${m}:${s.toString().padStart(2,'0')}`;
    if(r===0)clearSleepTimer();
  },500);
  showToast(t('sleepSet',{n:mins}),true);
};
function clearSleepTimer(){if(sleepTimer){clearTimeout(sleepTimer);sleepTimer=null;}if(sleepInterval){clearInterval(sleepInterval);sleepInterval=null;}sleepEndTime=null;document.getElementById('sleepIndicator')?.classList.remove('active');document.getElementById('sleepGroup')?.classList.remove('sleep-active');}

// ── VOICES ──
function loadVoices(){
  voices=window.speechSynthesis.getVoices();
  const sel=document.getElementById('voiceSelect'); sel.innerHTML='';
  if(!voices.length){sel.innerHTML=`<option>${t('voiceLoading')}</option>`;return;}
  const zh=voices.filter(v=>v.lang.startsWith('zh')||v.lang.startsWith('cmn'));
  const others=voices.filter(v=>!v.lang.startsWith('zh')&&!v.lang.startsWith('cmn'));
  [...zh,...others].forEach(v=>{const o=document.createElement('option');o.value=voices.indexOf(v);o.textContent=`${v.name} (${v.lang})`;sel.appendChild(o);});
  if(zh.length>0){selectedVoice=zh[0];sel.value=voices.indexOf(zh[0]);}
  else if(voices.length>0)selectedVoice=voices[0];
}
window.setVoice=()=>{const i=parseInt(document.getElementById('voiceSelect').value);if(!isNaN(i))selectedVoice=voices[i];};
window.addEventListener('load',()=>{loadVoices();window.speechSynthesis.onvoiceschanged=loadVoices;});

    desc: { zh: '使用 Google Gemini。有免費額度，適合入門使用。', en: 'Use Google Gemini. Has free tier, great for getting started.' },
  }
};

let currentProvider = localStorage.getItem('audioshelf_provider') || 'claude';

window.setProvider = (p) => {
  currentProvider = p;
  localStorage.setItem('audioshelf_provider', p);
  document.querySelectorAll('.provider-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(`ptab-${p}`)?.classList.add('active');
  updateApiKeyUI();
};

function getApiKey(provider = currentProvider) {
  return localStorage.getItem(PROVIDERS[provider].storageKey) || '';
}

window.saveApiKey = () => {
  const p = PROVIDERS[currentProvider];
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith(p.keyPrefix)) {
    showToast(`❌ 格式不對，應以 ${p.keyPrefix} 開頭`, false); return;
  }
  localStorage.setItem(p.storageKey, key);
  document.getElementById('apiKeyInput').value = '';
  updateApiKeyUI();
  showToast(t('apiKeySaved'), true);
};

window.clearApiKey = () => {
  localStorage.removeItem(PROVIDERS[currentProvider].storageKey);
  updateApiKeyUI();
  showToast(t('apiKeyCleared'), false);
};

function updateApiKeyUI() {
  const p = PROVIDERS[currentProvider];
  const hasKey = !!getApiKey();
  const status = document.getElementById('apiKeyStatus');
  const clearBtn = document.getElementById('btnClearKey');
  const input = document.getElementById('apiKeyInput');
  const info = document.getElementById('providerInfo');
  const noteLink = document.getElementById('apiKeyLink');
  const note = document.getElementById('apiKeyNote');

  if (info) info.textContent = p.desc[lang] || p.desc.zh;
  if (input) input.placeholder = hasKey ? '••••••••••••••••' : p.placeholder;
  if (noteLink) { noteLink.href = p.consoleUrl; noteLink.textContent = p.consoleName; }
  if (note) note.textContent = lang === 'en' ? 'Get API Key → ' : '取得 API Key → ';
  if (status) {
    status.textContent = hasKey ? t('apiKeySet') : t('apiKeyNotSet');
    status.style.background = hasKey ? 'rgba(74,138,90,0.15)' : 'rgba(255,255,255,0.05)';
    status.style.color = hasKey ? '#6ab87a' : 'var(--text-dim)';
    status.style.border = hasKey ? '1px solid rgba(74,138,90,0.3)' : '1px solid var(--border)';
  }
  if (clearBtn) clearBtn.style.display = hasKey ? 'block' : 'none';
  // Set active provider tab
  document.querySelectorAll('.provider-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(`ptab-${currentProvider}`)?.classList.add('active');
}

// ── GENERATE TAB ──
let genLang = 'zh';
let genResultText = '';
let genBookTitle = '';

window.setGenLang = (l) => {
  genLang = l;
  document.getElementById('genLangZh').classList.toggle('active', l==='zh');
  document.getElementById('genLangEn').classList.toggle('active', l==='en');
};
// Default active
setTimeout(()=>{
  document.getElementById('genLangZh').classList.add('active');
  setProvider(currentProvider);
}, 100);

window.generateSummary = async () => {
  const apiKey = getApiKey();
  if (!apiKey) { showToast(t('apiKeyMissing'), false); document.getElementById('apiKeyInput').focus(); return; }
  const bookName = document.getElementById('genBookName').value.trim();
  const minutes = parseInt(document.getElementById('genMinutes').value);
  if (!bookName) { showToast(t('genNoTitle'), false); return; }

  genBookTitle = bookName;
  genResultText = '';

  // Show result card
  document.getElementById('genResultCard').style.display = 'block';
  document.getElementById('genResultTitle').textContent = bookName;
  document.getElementById('genResultMeta').textContent = '';
  document.getElementById('genStreamBox').innerHTML = '<span class="gen-cursor"></span>';
  document.getElementById('genLoadingBar').style.display = 'block';
  document.getElementById('genLoadingText').textContent = t('generating');
  document.getElementById('genActionBtns').style.display = 'none';
  document.getElementById('btnGenerate').disabled = true;
  document.getElementById('btnGenerate').style.opacity = '0.6';

  // Scroll to result
  document.getElementById('genResultCard').scrollIntoView({behavior:'smooth', block:'start'});

  const langInstr = genLang === 'zh'
    ? '請用繁體中文寫作，適合台灣讀者。'
    : 'Please write in English.';

  const wordCount = minutes * 300; // ~300 chars/min for TTS
  const prompt = `請為《${bookName}》這本書寫一份 ${minutes} 分鐘的精華摘要（約 ${wordCount} 字）。${langInstr}

要求：
- 分成清楚的章節，每章節用「第X章 標題」的格式開頭
- 涵蓋書中最核心的概念、理論和實用建議
- 語言自然流暢，適合 TTS 朗讀
- 不要使用 markdown 格式（不用 ** 或 # 等符號）
- 直接開始寫內容，不需要前言說明這是摘要

請直接輸出摘要內容。`;

  try {
    let response;

    if (currentProvider === 'claude') {
      response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5',
          max_tokens: 6000,
          stream: true,
          messages: [{ role: 'user', content: prompt }]
        })
      });
    } else if (currentProvider === 'openai') {
      response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'gpt-4o',
          max_tokens: 6000,
          stream: true,
          messages: [{ role: 'user', content: prompt }]
        })
      });
    } else if (currentProvider === 'gemini') {
      response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:streamGenerateContent?alt=sse&key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: 6000 }
        })
      });
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    const box = document.getElementById('genStreamBox');
    box.innerHTML = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const json = JSON.parse(data);
          let delta = '';
          if (currentProvider === 'claude') {
            delta = json.delta?.text || '';
          } else if (currentProvider === 'openai') {
            delta = json.choices?.[0]?.delta?.content || '';
          } else if (currentProvider === 'gemini') {
            delta = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
          }
          if (delta) {
            genResultText += delta;
            box.textContent = genResultText;
            box.scrollTop = box.scrollHeight;
          }
        } catch(e) {}
      }
    }

    // Done
    document.getElementById('genLoadingBar').style.display = 'none';
    document.getElementById('genResultMeta').textContent = `${minutes} 分鐘摘要 · ${genResultText.length.toLocaleString()} ${t('chars')}`;
    document.getElementById('genActionBtns').style.display = 'flex';
    document.getElementById('btnGenerate').disabled = false;
    document.getElementById('btnGenerate').style.opacity = '1';

  } catch(err) {
    document.getElementById('genLoadingBar').style.display = 'none';
    document.getElementById('genStreamBox').textContent = '❌ 生成失敗，請重試。';
    document.getElementById('btnGenerate').disabled = false;
    document.getElementById('btnGenerate').style.opacity = '1';
    console.error(err);
  }
};

window.regenerate = () => {
  document.getElementById('genResultCard').style.display = 'none';
  generateSummary();
};

window.discardGen = () => {
  document.getElementById('genResultCard').style.display = 'none';
  genResultText = '';
};

window.saveGeneratedBook = async () => {
  if (!genResultText) return;
  const chapters = parseChapters(genResultText);
  const book = {
    id: Date.now().toString(),
    title: genBookTitle,
    emoji: '✨',
    rawText: genResultText,
    chapters,
    progress: { chapterIdx: 0, charOffset: 0 },
    note: '',
    addedAt: Date.now()
  };
  books.unshift(book);
  await saveBookToFS(book);
  renderShelf(); renderMyBooksList();
  showToast(t('genSaved'), true);
  // Switch to shelf and open reader
  setTimeout(() => { switchTab('shelf'); }, 500);
};

// ── TOAST ──
let toastTimer;
window.showToast=(msg,gold=false)=>{const t2=document.getElementById('toast');t2.textContent=msg;t2.className=`toast show${gold?' gold':''}`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>t2.classList.remove('show'),2800);};
</script>
